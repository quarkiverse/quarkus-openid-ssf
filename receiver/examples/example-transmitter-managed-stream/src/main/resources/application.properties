quarkus.http.port=28080

# Omit null, empty fields from JSON responses (e.g. an absent `reason` on stream-status).
quarkus.jackson.serialization-inclusion=non-empty

# Don't spin up a Keycloak Dev Service container — quarkus-oidc-client is on
# the classpath because outbound transmitter calls use the client_credentials
# grant, but we always point at a real transmitter, never a dev container.
quarkus.keycloak.devservices.enabled=false

quarkus.console.color=false

# --- SSF receiver extension --------------------------------------------------
#
# Scenarios are picked by activating a delivery profile:
#
#   -Dquarkus.profile=push    PUSH delivery
#   -Dquarkus.profile=poll    POLL delivery (RFC 8936)
#
# Only one transmitter (Keycloak) is wired up here — the OIDC client_credentials
# grant configured below is the only supported outbound auth mode in
# transmitter-managed flows today.

# transmitter-issuer is required — the startup validator fails fast if missing.
quarkus.openid-ssf.receiver.transmitter-issuer=${SSF_RECEIVER_TRANSMITTER_ISSUER:}

# Optional explicit metadata URL. Useful for transmitters whose well-known path
# doesn't follow the SSF §7.2 splice rule (e.g. some Keycloak realms expose the
# document at /realms/{realm}/.well-known/ssf-configuration). Leave blank to
# let the extension derive it from transmitter-issuer.
#quarkus.openid-ssf.receiver.transmitter-metadata-url=${SSF_RECEIVER_TRANSMITTER_METADATA_URL:}

# Optional explicit JWKS URL. Same reasoning as transmitter-metadata-url —
# override only if metadata discovery doesn't surface the right jwks_uri.
#quarkus.openid-ssf.receiver.transmitter-jwks-url=${SSF_RECEIVER_TRANSMITTER_JWKS_URL:}

# Transmitter-managed mode: the operator (or the transmitter's onboarding flow)
# pre-creates the stream and hands us back the assigned stream_id, which we
# pin here. Receiver-managed mode (the other example) uses the
# discover-or-create flow instead.
quarkus.openid-ssf.receiver.stream-management=TRANSMITTER

# The pinned stream_id assigned by the transmitter. Required in TRANSMITTER mode.
quarkus.openid-ssf.receiver.stream-id=${SSF_RECEIVER_STREAM_ID:}

# Audience this receiver expects on inbound SETs.
quarkus.openid-ssf.receiver.expected-audience=${SSF_RECEIVER_EXPECTED_AUDIENCE:https://my.expected.audience.com}

# --- OIDC client (client_credentials grant for outbound transmitter calls) ---
# auth-server-url is the OIDC issuer; Quarkus discovers the token endpoint via
# <issuer>/.well-known/openid-configuration. Typically the same realm that
# acts as the SSF transmitter — but doesn't have to be.
quarkus.oidc-client.auth-server-url=${OIDC_ISSUER_URL:}
quarkus.oidc-client.client-id=${SSF_RECEIVER_CLIENT_ID}
quarkus.oidc-client.credentials.secret=${SSF_RECEIVER_CLIENT_SECRET}
quarkus.oidc-client.grant.type=client
quarkus.oidc-client.scopes=ssf.read,ssf.manage
