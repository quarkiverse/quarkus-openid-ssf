quarkus.http.port=28080

# Omit null, empty fields from JSON responses (e.g. an absent `reason` on stream-status).
quarkus.jackson.serialization-inclusion=non-empty

# Don't spin up a Keycloak Dev Service container — quarkus-oidc-client is on
# the classpath for the `keycloak` profile, but we always point at a real
# transmitter, never a dev container.
quarkus.keycloak.devservices.enabled=false

# --- SSF receiver extension --------------------------------------------------
quarkus.console.color=false

# Pick a transmitter via env vars, or activate a profile-specific overlay:
#   -Dquarkus.profile=caepdev    → loads application-caepdev.properties
#                                  (pre-fills caep.dev-specific overrides)
#
# Both transmitter-issuer and expected-audience must be set (either here, via
# env vars, or via a profile) — the startup validator fails fast if they're
# missing.
quarkus.openid-ssf.receiver.transmitter-issuer=${SSF_RECEIVER_TRANSMITTER_ISSUER:}

# Long-lived bearer token sent on every outbound call to the transmitter when
# quarkus-oidc-client is NOT in play. When this is set, the extension registers
# StaticTransmitterTokenProvider; otherwise it expects an OIDC client config.
quarkus.openid-ssf.receiver.transmitter-access-token=${SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN:}

# Receiver-managed mode: this app creates and owns its stream on the transmitter.
quarkus.openid-ssf.receiver.stream-management=RECEIVER

# Sent as the create-stream request's delivery.endpoint_url. Must be reachable
# from the transmitter — for local development expose this app via a tunnel
# (e.g. `cloudflared tunnel --url http://localhost:28081`) and put the public
# URL here. The registrar also uses this as the stable identifier when matching
# an existing stream on restart.
quarkus.openid-ssf.receiver.push.delivery-endpoint-url=${SSF_RECEIVER_PUSH_DELIVERY_URL:http://localhost:28081/ssf/push}
quarkus.openid-ssf.receiver.push.endpoint-path=/ssf/push
# Optional shared secret enforced on the inbound Authorization header.
#quarkus.openid-ssf.receiver.push.expected-auth-header=Bearer changeme

# Audience this receiver expects on inbound SETs and that we ask the transmitter
# to mint streams for. The discover-or-create dance also matches against this
# when a stream's delivery URL doesn't line up.
quarkus.openid-ssf.receiver.expected-audience=${SSF_RECEIVER_EXPECTED_AUDIENCE:https://my.expected.audience.com}

# Event types this receiver wants to subscribe to. Required when registering a
# stream — translates to events_requested on the create-stream request. Each
# entry can be a full URI or a built-in / configured alias (CaepSessionRevoked,
# RiscAccountDisabled, …); unknown aliases fail fast at startup with a list of
# the registered names.
quarkus.openid-ssf.receiver.events-requested=CaepSessionRevoked,CaepCredentialChange

# Built-in event-type aliases (SsfStreamVerification, CaepSessionRevoked,
# RiscAccountDisabled, …) cover SSF + CAEP 1.0 + RISC 1.0 out of the box —
# no entries are needed here for spec event types. Add quarkus.openid-ssf.receiver.event-aliases.*
# only for vendor-specific URIs you want to alias; unknown URIs fall through
# unchanged.

# Stable name for THIS receiver — surfaces as the `receiver` tag so multiple
# receiver instances scraping into the same Prometheus stay distinguishable.
quarkus.openid-ssf.receiver.alias=quarkus-openid-ssf-receiver

# Discover-or-create on startup. Set register-stream=false to manage stream
# lifecycle entirely from application code via SsfStreamClient.
quarkus.openid-ssf.receiver.receiver-managed.register-stream=true
quarkus.openid-ssf.receiver.receiver-managed.delete-on-shutdown=false
quarkus.openid-ssf.receiver.receiver-managed.description=quarkus-openid-ssf-receiver example

# --- Optional: switch to POLL delivery (RFC 8936) -----------------------------
# Useful when you can't expose a public push endpoint (no tunnel, behind NAT).
# When delivery-method=POLL the transmitter assigns the poll URL during
# createStream and the extension discovers it from the stream config; the
# delivery-endpoint-url above is then ignored.
#
#quarkus.openid-ssf.receiver.delivery-method=POLL
#quarkus.openid-ssf.receiver.poll.interval=10s
#quarkus.openid-ssf.receiver.poll.start-delay=2s
#quarkus.openid-ssf.receiver.poll.max-events=50
#quarkus.openid-ssf.receiver.poll.return-immediately=true
#quarkus.openid-ssf.receiver.poll.drain-on-poll=true
# Set auto-start=false to drive polling manually via SsfPoller.pollNow():
#quarkus.openid-ssf.receiver.poll.auto-start=true

# Profile-specific overlays live in sibling files:
#   application-caepdev.properties → caep.dev transmitter
