# Transmitter axis: Keycloak
# Pair with a delivery profile: -Dquarkus.profile=keycloak,push  or  keycloak,poll
#
# Outbound transmitter calls (create-stream, JWKS fetch, poll, ack) are
# authenticated with a Bearer token from OidcClient using the client_credentials
# grant. Required env vars: OIDC_ISSUER_URL, SSF_RECEIVER_TRANSMITTER_ISSUER,
# SSF_RECEIVER_CLIENT_ID, SSF_RECEIVER_CLIENT_SECRET.

quarkus.openid-ssf.receiver.transmitter-issuer=${SSF_RECEIVER_TRANSMITTER_ISSUER}

# Defensive: an explicit empty value overrides any globally-set
# SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN env var so the deployment processor's
# build-time check sees a blank and falls back to OIDC instead of Static.
quarkus.openid-ssf.receiver.transmitter-access-token=

quarkus.openid-ssf.receiver.issuer-aliases.KeycloakSsfPoc=${SSF_RECEIVER_ISSUER_ALIASES_KEYCLOAKSSFPOC}

# OIDC client for outbound auth
quarkus.oidc-client.auth-server-url=${OIDC_ISSUER_URL}
quarkus.oidc-client.client-id=${SSF_RECEIVER_CLIENT_ID}
quarkus.oidc-client.credentials.secret=${SSF_RECEIVER_CLIENT_SECRET}
quarkus.oidc-client.grant.type=client
quarkus.oidc-client.scopes=ssf.read,ssf.manage
