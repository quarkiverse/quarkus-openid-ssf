# Transmitter axis: caep.dev
# Pair with a delivery profile: -Dquarkus.profile=caepdev,push  or  caepdev,poll
#
# caep.dev hands out long-lived bearer tokens out-of-band (sign in to ssf.caep.dev
# and copy the token from the dashboard) rather than via an OAuth grant; paste
# yours into SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN. The token is required —
# without it, every outbound call to caep.dev returns 401.

quarkus.openid-ssf.receiver.transmitter-issuer=https://ssf.caep.dev
#quarkus.openid-ssf.receiver.transmitter-metadata-url=https://ssf.caep.dev/.well-known/ssf-configuration
quarkus.openid-ssf.receiver.transmitter-access-token=${SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN:replace-me-with-caep-dev-token}

quarkus.openid-ssf.receiver.issuer-aliases.CaepDev=https://ssf.caep.dev
