# Profile: keycloak
# Activate with: -Dquarkus.profile=keycloak
#
# Targets the same Keycloak realm as the example-transmitter-managed-stream
# example, but as a separate OIDC client and with POLL delivery so this app
# pulls SETs instead of needing a public push endpoint.
#
# Note: the auth-mode decision (Static vs OIDC TransmitterTokenProvider) is
# made at BUILD time. In dev mode each `quarkus:dev` launch re-runs build
# steps, so the active profile is honored. For a packaged jar you have to
# repackage with the profile: `mvn package -Dquarkus.profile=keycloak`.

# Drop the empty fallback from the default profile — Keycloak mode requires
# an explicit issuer URL.
ssf.receiver.transmitter-issuer=${SSF_RECEIVER_TRANSMITTER_ISSUER}

ssf.receiver.expected-audience=https://my.expected.audience.com

# Defensive: an explicit empty value overrides any globally-set
# SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN env var so the deployment processor's
# build-time check sees a blank and falls back to OIDC instead of Static.
ssf.receiver.transmitter-access-token=

# Switch to POLL delivery. The transmitter assigns delivery.endpoint_url
# during createStream, so push.delivery-endpoint-url is irrelevant here.
ssf.receiver.delivery-method=POLL
ssf.receiver.poll.interval=10s
ssf.receiver.poll.start-delay=2s
ssf.receiver.poll.max-events=50
ssf.receiver.poll.return-immediately=true
ssf.receiver.poll.drain-on-poll=true
ssf.receiver.poll.auto-start=true

ssf.receiver.issuer-aliases.KeycloakSsfPoc=${SSF_RECEIVER_ISSUER_ALIASES_KEYCLOAKSSFPOC}

ssf.receiver.receiver-managed.description=quarkus-ssf-receiver example (keycloak / POLL)

# OIDC client for outbound auth — distinct client-id from the
# transmitter-managed example so audit trails / rate-limiting are separable.
quarkus.oidc-client.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL}
quarkus.oidc-client.client-id=quarkus-ssf-receiver
quarkus.oidc-client.credentials.secret=${KEYCLOAK_RECEIVER_MANAGED_CLIENT_SECRET}
quarkus.oidc-client.grant.type=client
quarkus.oidc-client.scopes=ssf.read,ssf.manage
