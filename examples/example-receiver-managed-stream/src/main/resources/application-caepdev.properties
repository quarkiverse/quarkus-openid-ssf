# Activate with `-Dquarkus.profile=caepdev` (or QUARKUS_PROFILE=caepdev). Points
# the receiver at https://ssf.caep.dev — the community SSF transmitter that's
# handy for end-to-end testing.
#
# caep.dev hands out long-lived bearer tokens out-of-band (sign in to ssf.caep.dev
# and copy the token from the dashboard) rather than via an OAuth grant; paste
# yours into SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN. The token is required —
# without it, every outbound call to caep.dev returns 401.

ssf.receiver.transmitter-issuer=https://ssf.caep.dev
#ssf.receiver.transmitter-metadata-url=https://ssf.caep.dev/.well-known/ssf-configuration
ssf.receiver.transmitter-access-token=${SSF_RECEIVER_TRANSMITTER_ACCESS_TOKEN:replace-me-with-caep-dev-token}

ssf.receiver.issuer-aliases.CaepDev=https://ssf.caep.dev

ssf.receiver.receiver-managed.description=quarkus-ssf-receiver example (caep.dev)
