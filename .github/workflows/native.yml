name: Native build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.adoc'
      - '**.txt'
      - 'LICENSE'
      - 'design/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.adoc'
      - '**.txt'
      - 'LICENSE'
      - 'design/**'
  schedule:
    # Weekly run catches drift when transitive Quarkus / Mandrel releases
    # change native compatibility under our feet.
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-native:
    name: Native · ${{ matrix.example }}
    strategy:
      fail-fast: false
      matrix:
        # Native builds are slow (~5–10 min each) so we only check the two
        # consumer apps. If they compile, the extension's bytecode is
        # native-image-friendly.
        example:
          - example-transmitter-managed-stream
          - example-receiver-managed-stream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'

      # Install the extension first so the example build can resolve it locally.
      - name: Install extension
        run: mvn -B -DskipTests -Dno-format -pl receiver/runtime,receiver/deployment install

      - name: Native build
        run: |
          mvn -B -DskipTests -Dno-format \
            -pl receiver/examples/${{ matrix.example }} \
            -am \
            -Pnative \
            -Dquarkus.native.container-build \
            package

      - name: Inspect native binary
        run: |
          BIN=$(find receiver/examples/${{ matrix.example }}/target -maxdepth 2 -type f -perm -u+x ! -name "*.jar" ! -name "*.so" | head -n1)
          if [ -z "$BIN" ]; then
            echo "::error::No native binary produced under receiver/examples/${{ matrix.example }}/target/"
            exit 1
          fi
          echo "Native binary: $BIN"
          ls -lh "$BIN"
          file "$BIN"
